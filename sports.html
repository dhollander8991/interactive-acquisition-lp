<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tippe ein Spiel und sichere dir deine Freiwette für genau diese Partie.">
<title>Neukundenangebot</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230B0F14'/%3E%3C/svg%3E">
<link rel="preload" href="config.json" as="fetch" crossorigin="anonymous">
<link rel="stylesheet" href="styles.css">
</head>

<body class="theme-sports" data-vertical="sports">
<div class="shell">

  <header class="masthead">
    <p class="wordmark">&nbsp;</p>
    <span class="age-badge">&nbsp;</span>
  </header>

  <main>
    <section class="hero">
      <svg class="hero-art" viewBox="0 0 340 300" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="sBeam" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#F0A81C" stop-opacity=".17"/><stop offset="1" stop-color="#F0A81C" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="sBall" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#F4EDDE"/><stop offset="1" stop-color="#B9AF9C"/>
          </linearGradient>
          <linearGradient id="sScrim" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0B0F14"/><stop offset=".5" stop-color="#0B0F14" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon points="34,-20 96,-20 268,300 136,300" fill="url(#sBeam)"/>
        <polygon points="322,-20 258,-20 56,300 190,300" fill="url(#sBeam)"/>
        <path d="M-10 264 Q170 196 350 264 L350 300 L-10 300 Z" fill="#10161E"/>
        <path d="M-10 264 Q170 196 350 264" fill="none" stroke="#F0A81C" stroke-opacity=".4" stroke-width="1.5"/>
        <g stroke="#F0A81C" stroke-linecap="round" fill="none">
          <path d="M46 148 H152" stroke-width="5" stroke-opacity=".85"/>
          <path d="M30 174 H130" stroke-width="4" stroke-opacity=".5"/>
          <path d="M60 198 H140" stroke-width="3" stroke-opacity=".3"/>
        </g>
        <g transform="translate(240 162) rotate(9)">
          <circle r="54" fill="url(#sBall)"/>
          <path d="M0 -21 L-20 -6.5 L-12.4 17 L12.4 17 L20 -6.5 Z" fill="#0B0F14"/>
          <path d="M0 -21 L0 -53 M-20 -6.5 L-50 -16 M-12.4 17 L-31 43 M12.4 17 L31 43 M20 -6.5 L50 -16" stroke="#0B0F14" stroke-width="3"/>
          <circle r="54" fill="none" stroke="#0B0F14" stroke-width="3"/>
          <path d="M-40 -35 A54 54 0 0 1 40 -35" fill="none" stroke="#F0A81C" stroke-opacity=".55" stroke-width="4"/>
        </g>
        <rect width="340" height="300" fill="url(#sScrim)"/>
      </svg>
      <p class="eyebrow">&nbsp;</p>
      <h1 class="headline">&nbsp;</h1>
      <p class="subhead">&nbsp;</p>
    </section>

    <section class="widget" aria-labelledby="prompt">
      <h2 class="prompt" id="prompt">&nbsp;</h2>

      <ul class="choices" id="choices"></ul>

      <div class="loader" id="loader">
        <div class="spinner" role="presentation"></div>
        <p class="loader-label" role="status">Spiele werden geladen</p>
      </div>

      <div class="result" id="result" role="status" hidden>
        <p class="result-label">Deine Auswahl</p>
        <p class="result-title"></p>
        <p class="result-terms"></p>
        <a class="cta" href="#register">Konto erstellen</a>
      </div>
    </section>
  </main>

  <footer class="compliance">
    <p class="rg-message"></p>
    <p>
      <a class="rg-link" href="#" rel="noopener noreferrer" target="_blank"></a>
    </p>
    <p class="licence"></p>

    <button class="terms-toggle" type="button" aria-expanded="false" aria-controls="terms">
      <span class="terms-toggle-label">Teilnahmebedingungen</span>
    </button>
    <div class="terms-body" id="terms" hidden>
      <ul></ul>
    </div>

    <p class="skin-switch"><a href="index.html">Zum Casino-Konzept &rarr;</a></p>
  </footer>

</div>
<script src="app.js" defer></script>
</body>
</html>
